name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - variant: standard
            enable_ms_login: "false"
            suffix: ""
          - variant: mslogin
            enable_ms_login: "true"
            suffix: "-mslogin"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION_ROOT="${TAG%.*}"
          BUILD_NUMBER="${TAG##*.}"
          echo "version_root=$VERSION_ROOT" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          java-package: 'jdk+fx'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: never

      - name: Build with Gradle
        run: xvfb-run ./gradlew build --no-daemon --parallel
        env:
          HMCL_OFFICIAL: "true"
          VERSION_ROOT: ${{ steps.version.outputs.version_root }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          ENABLE_MICROSOFT_LOGIN: ${{ matrix.enable_ms_login }}
          MICROSOFT_AUTH_ID: ${{ secrets.MICROSOFT_AUTH_ID }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

      - name: Rename artifacts
        if: matrix.suffix != ''
        run: |
          set -euo pipefail
          cd HMCL/build/libs
          SUFFIX="${{ matrix.suffix }}"
          for f in HMCL-*.jar HMCL-*.exe HMCL-*.sh; do
            [ -f "$f" ] || continue
            [[ "$f" == *sources* ]] && continue
            EXT="${f##*.}"
            BASE="${f%.*}"
            mv "$f" "${BASE}${SUFFIX}.${EXT}"
            for hash in sha1 sha256 sha512; do
              [ -f "$f.$hash" ] && mv "$f.$hash" "${BASE}${SUFFIX}.${EXT}.$hash"
            done
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.variant }}
          path: |
            HMCL/build/libs/HMCL-*${{ matrix.suffix }}.jar
            HMCL/build/libs/HMCL-*${{ matrix.suffix }}.exe
            HMCL/build/libs/HMCL-*${{ matrix.suffix }}.sh
            HMCL/build/libs/HMCL-*${{ matrix.suffix }}.*.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - name: Prepare release notes
        id: notes
        run: |
          set -euo pipefail
          {
            echo "| File | SHA-256 |"
            echo "| --- | --- |"
            for f in assets/HMCL-*.{jar,exe,sh}; do
              [ -f "$f" ] || continue
              NAME=$(basename "$f")
              SHA=$(cat "$f.sha256" 2>/dev/null | tr -d '\n' || echo "n/a")
              echo "| \`$NAME\` | \`$SHA\` |"
            done
          } > RELEASE_NOTE.md

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            assets/HMCL-*.jar \
            assets/HMCL-*.exe \
            assets/HMCL-*.sh \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTE.md \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
